<html>
<head>
    <title>IOSWebApp ~ pikaiixe.ddns.net</title>
    <link rel="stylesheet" type="text/css" href="src/css/Style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="TopNav">
        <a href="index.html" class="Back">Back</a>
        <h1>IOSWebApp ~ pikaiixe.ddns.net</h1>
        <div class="navigation" onclick="toggleDiv()">Navigation</div>
    </div>
    <script>
        function toggleDiv() {
            var div = document.getElementById("navi");
            if (div.style.display === "none") {
                div.style.display = "block";
            } else {
                div.style.display = "none";
            }
        }
    </script>
    <div id="navi" class="navi">
        <a class="Button" onclick="goBack()">Back</a>
        <a href="Files.html" class="Button">Home</a>
        <a class="Button" onclick="goForward()">Forward</a>
    </div>
    <div class="Content-me">
        <iframe src="http://pikaiixe.ddns.net" frameborder="0" id="myFrame"></iframe>
    </div>
    <script>
        var iframe = document.getElementById('myFrame');
    
        function goBack() {
            if (iframe.contentWindow.history) {
                iframe.contentWindow.history.back();
            }
        }
    
        function goForward() {
            if (iframe.contentWindow.history) {
                iframe.contentWindow.history.forward();
            }
        }
    </script>
    <div class="down">
        <a href="https://github.com/andreiixe" class="Button">Github</a>
        <a href="mailto:akaiandrei825@gmail.com" class="Button">Email</a>
        <a href="https://www.instagram.com/andreiixe/" class="Button">Social</a>
    </div>
    <div class="Footer">
        &copy;2024 Andreiixe
    </div>
</body>
</html>
